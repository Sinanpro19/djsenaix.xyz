<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DJ SenaiX Music Tracks</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1D60B9",
            "background-light": "#FAFAFA",
            "background-dark": "#000000",
            "glass-bg": "rgba(255,255,255,0.05)",
            "glass-border": "rgba(255,255,255,0.1)",
          },
          fontFamily: {
            "display": ["SF Pro", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'SF Pro', sans-serif;
      animation: fadeIn 1.5s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .glassmorphism {
      background: rgba(29, 96, 185, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .track-card {
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .track-card:hover {
      box-shadow: 0 0 30px rgba(29,96,185,0.2);
      transform: scale(1.03) translateY(-4px);
    }
    .glassmorphism {
      animation: fadeIn 1.2s cubic-bezier(0.4,0,0.2,1);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="fixed inset-0 bg-gradient-to-br from-primary/10 to-transparent z-0 pointer-events-none"></div>
<div class="relative z-10 flex flex-col min-h-screen">
<header class="sticky top-0 z-50 glassmorphism border-b border-glass-border px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white">
      <img src="logo.png" alt="SenaiX Logo" class="w-8 h-8 rounded-full object-cover"/>
    </div>
    <h1 class="text-xl font-bold tracking-tight">DJ SenaiX</h1>
  </div>
  <nav class="hidden md:flex items-center gap-8">
    <a class="text-sm font-medium text-primary transition-colors" href="senaix_os_concept_details.html">OS Concept</a>
    <a class="text-sm font-medium text-primary transition-colors" href="dj_senaix_music_tracks.html">DJ Profile</a>
    <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="senaix_other_projects_grid.html">Projects</a>
    <a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="index.html">Home</a>
  </nav>
  <button onclick="toggleTheme()" class="ml-4 bg-glass-bg border border-glass-border px-4 py-2 rounded-full text-sm font-medium text-primary hover:bg-primary hover:text-white transition-all">Toggle Theme</button>
</header>
<script src="toggle_theme.js"></script>
</header>
<main class="flex-grow flex flex-col items-center pt-20 pb-16 px-6 max-w-4xl mx-auto w-full">
  <section class="text-center mb-12">
    <h2 class="text-4xl md:text-5xl font-black mb-6 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-primary">Music Tracks</h2>
    <p class="text-lg text-slate-400 mb-4 font-light">All DJ SeaniX musics</p>
  </section>
  <section class="w-full grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Track 1 -->
    <div class="glassmorphism track-card rounded-2xl p-6 flex flex-col items-center">
      <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=400&q=80" alt="Track Cover" class="rounded-xl w-full mb-4"/>
      <h3 class="text-xl font-bold mb-2">kottana</h3>
      <p class="text-slate-400 text-sm mb-1">DJ SenaiX &bull; 2025</p>
      <p class="text-slate-400 text-sm mb-3">Release Date: 2025-12-25</p>
      <audio controls class="w-full mb-2">
        <source src="no" type="audio/mpeg"/>
        Your browser does not support the audio element.
      </audio>
      <button class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-full font-semibold text-md transition-all shadow-[0_0_20px_rgba(29,96,185,0.2)]">Play</button>
    </div>
    <!-- Track 2 -->
    <div class="glassmorphism track-card rounded-2xl p-6 flex flex-col items-center">
      <img src="no" alt="Track Cover" class="rounded-xl w-full mb-4"/>
      <h3 class="text-xl font-bold mb-2">FLIGHT</h3>
      <p class="text-slate-400 text-sm mb-1">DJ SenaiX &bull; 2026</p>
      <p class="text-slate-400 text-sm mb-3">Release Date: 2026-01-30</p>
      <audio controls class="w-full mb-2">
        <source src="no" type="audio/mpeg"/>
        Your browser does not support the audio element.
      </audio>
      <button class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-full font-semibold text-md transition-all shadow-[0_0_20px_rgba(29,96,185,0.2)]">Play</button>
    </div>
  </section>
</main>
<footer class="border-t border-glass-border py-8 text-center mt-auto">
  <div class="flex justify-center gap-6 mb-6">
    <a class="text-slate-400 hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined">share</span>
    </a>
    <a class="text-slate-400 hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined">photo_camera</span>
    </a>
    <a class="text-slate-400 hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined">music_note</span>
    </a>
    <a class="text-slate-400 hover:text-primary transition-colors" href="#">
      <span class="material-symbols-outlined">code</span>
    </a>
  </div>
  <p class="text-slate-500 text-sm font-medium">© 2024 SenaiX. All rights reserved.</p>
</footer>
</div>
</body>
</html>
